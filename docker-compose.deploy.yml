version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: gymjjak-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - gymjjak-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: xxv211/gymjjak-backend:develop
    container_name: gymjjak-backend
    restart: no
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}

      APP_SCHEDULER_RETENTION_CRON: ${APP_SCHEDULER_RETENTION_CRON}
      APP_SCHEDULER_RETENTION_ZONE: ${APP_SCHEDULER_RETENTION_ZONE}
      APP_RETENTION_REPORT_GROUP_PERIOD_DAYS: ${APP_RETENTION_REPORT_GROUP_PERIOD_DAYS}
      APP_RETENTION_REPORT_GROUP_BATCH_SIZE: ${APP_RETENTION_REPORT_GROUP_BATCH_SIZE}

      CLOVA_OCR_INVOKE_URL: ${CLOVA_OCR_INVOKE_URL}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY}
    ports:
      - "${BACKEND_PORT}:8080"
# Docker 영구 저장소 설정
volumes:
  gymjjak-mysql-data: