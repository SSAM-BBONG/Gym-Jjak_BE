version: "3.8"

services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: gymjjak-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-deploy}
      DEPLOY_MYSQL_URL: ${DEPLOY_MYSQL_URL}
      DEPLOY_MYSQL_USERNAME: ${DEPLOY_MYSQL_USERNAME}
      DEPLOY_MYSQL_PASSWORD: ${DEPLOY_MYSQL_PASSWORD}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}

      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:?NAVER_CLIENT_ID is required}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:?NAVER_CLIENT_SECRET is required}

      OAUTH2_SUCCESS_REDIRECT_URL: ${OAUTH2_SUCCESS_REDIRECT_URL}

      AWS_REGION: ${AWS_REGION}
      AWS_S3_ACCESS_KEY_ID: ${AWS_S3_ACCESS_KEY_ID}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}

      APP_SCHEDULER_RETENTION_CRON: ${APP_SCHEDULER_RETENTION_CRON}
      APP_SCHEDULER_RETENTION_ZONE: ${APP_SCHEDULER_RETENTION_ZONE}
      APP_RETENTION_REPORT_GROUP_PERIOD_DAYS: ${APP_RETENTION_REPORT_GROUP_PERIOD_DAYS}
      APP_RETENTION_REPORT_GROUP_BATCH_SIZE: ${APP_RETENTION_REPORT_GROUP_BATCH_SIZE}
      APP_RETENTION_WITHDRAWN_USER_ENABLED: ${APP_RETENTION_WITHDRAWN_USER_ENABLED}
      APP_RETENTION_WITHDRAWN_USER_PERIOD_DAYS: ${APP_RETENTION_WITHDRAWN_USER_PERIOD_DAYS}
      APP_RETENTION_WITHDRAWN_USER_BATCH_SIZE: ${APP_RETENTION_WITHDRAWN_USER_BATCH_SIZE}
      APP_RETENTION_PT_COURSE_PERIOD_DAYS: ${APP_RETENTION_PT_COURSE_PERIOD_DAYS}
      APP_RETENTION_PT_COURSE_BATCH_SIZE: ${APP_RETENTION_PT_COURSE_BATCH_SIZE}
      APP_RETENTION_FEEDBACK_PERIOD_DAYS: ${APP_RETENTION_FEEDBACK_PERIOD_DAYS}
      APP_RETENTION_FEEDBACK_BATCH_SIZE: ${APP_RETENTION_FEEDBACK_BATCH_SIZE}
      APP_RETENTION_TRAINER_REVIEW_PERIOD_DAYS: ${APP_RETENTION_TRAINER_REVIEW_PERIOD_DAYS}
      APP_RETENTION_TRAINER_REVIEW_BATCH_SIZE: ${APP_RETENTION_TRAINER_REVIEW_BATCH_SIZE}
      APP_RETENTION_NOTIFICATION_PERIOD_DAYS: ${APP_RETENTION_NOTIFICATION_PERIOD_DAYS}
      APP_RETENTION_NOTIFICATION_BATCH_SIZE: ${APP_RETENTION_NOTIFICATION_BATCH_SIZE}
      APP_RETENTION_ORGANIZATION_TRAINER_PERIOD_DAYS: ${APP_RETENTION_ORGANIZATION_TRAINER_PERIOD_DAYS}
      APP_RETENTION_ORGANIZATION_TRAINER_BATCH_SIZE: ${APP_RETENTION_ORGANIZATION_TRAINER_BATCH_SIZE}
      APP_RETENTION_CHAT_ROOM_PERIOD_DAYS: ${APP_RETENTION_CHAT_ROOM_PERIOD_DAYS}
      APP_RETENTION_CHAT_ROOM_BATCH_SIZE: ${APP_RETENTION_CHAT_ROOM_BATCH_SIZE}

      CLOVA_OCR_INVOKE_URL: ${CLOVA_OCR_INVOKE_URL}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY}
    expose:
      - "8080"

  caddy:
    image: caddy:2.8
    container_name: gymjjak-caddy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - gymjjak-caddy-data:/data
      - gymjjak-caddy-config:/config

  promtail:
    image: grafana/promtail:2.9.8
    container_name: gymjjak-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      MONITORING_EC2_PRIVATE_IP: ${MONITORING_EC2_PRIVATE_IP}
    volumes:
      - ./monitoring/promtail/promtail-config.deploy.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  gymjjak-caddy-data:
  gymjjak-caddy-config: