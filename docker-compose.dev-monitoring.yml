version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.8
    container_name: gymjjak-dev-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3101}:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - gymjjak-dev-loki-data:/loki-data

  promtail:
    image: grafana/promtail:2.9.8
    container_name: gymjjak-dev-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: gymjjak-dev-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - gymjjak-dev-prometheus-data:/prometheus
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: gymjjak-dev-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_TIMEZONE: Asia/Seoul
    volumes:
      - gymjjak-dev-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - prometheus

volumes:
  gymjjak-dev-loki-data:
  gymjjak-dev-prometheus-data:
  gymjjak-dev-grafana-data: