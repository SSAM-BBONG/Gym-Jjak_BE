spring:
  datasource:
    url: ${LOCAL_MYSQL_URL}
    username: ${LOCAL_MYSQL_USERNAME}
    password: ${LOCAL_MYSQL_PASSWORD}

  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  retention:
    withdrawn-user:
      period-days: 30
      batch-size: 100
    report-group:
      period-days: 30
      batch-size: 100

logging:
  level:
    org.hibernate.SQL: debug