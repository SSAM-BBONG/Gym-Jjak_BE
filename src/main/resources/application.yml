spring:
  application:
    name: Gym-Jjak

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LOCAL_MYSQL_URL}
    username: ${LOCAL_MYSQL_USERNAME}
    password: ${LOCAL_MYSQL_PASSWORD}

  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/gymjjak_dummy_v01.sql

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

logging:
  level:
    org.hibernate.SQL: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

cloud:
  aws:
    region: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, reportgroup, report

app:
  scheduler:
    retention:
      cron: "${APP_SCHEDULER_RETENTION_CRON:0 0 3 * * *}"
      zone: "${APP_SCHEDULER_RETENTION_ZONE:Asia/Seoul}"

  retention:
    report-group:
      period-days: ${APP_RETENTION_REPORT_GROUP_PERIOD_DAYS}
      batch-size: ${APP_RETENTION_REPORT_GROUP_BATCH_SIZE}

clova:
  ocr:
    invoke-url: "${CLOVA_OCR_INVOKE_URL}"
    secret-key: "${CLOVA_OCR_SECRET_KEY}"
