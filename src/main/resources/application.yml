spring:
  application:
    name: Gym-Jjak

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: baseline existing schema
    validate-on-migrate: true
    clean-disabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

cloud:
  aws:
    region: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  scheduler:
    retention:
      cron: "${APP_SCHEDULER_RETENTION_CRON:0 0 3 * * *}"
      zone: "${APP_SCHEDULER_RETENTION_ZONE:Asia/Seoul}"

  retention:
    report-group:
      period-days: ${APP_RETENTION_REPORT_GROUP_PERIOD_DAYS}
      batch-size: ${APP_RETENTION_REPORT_GROUP_BATCH_SIZE}

clova:
  ocr:
    invoke-url: "${CLOVA_OCR_INVOKE_URL}"
    secret-key: "${CLOVA_OCR_SECRET_KEY}"