spring:
  application:
    name: Gym-Jjak

# hi
#  cache:
#    type: redis
#
#  data:
#    redis:
#      host: ${REDIS_HOST:localhost}
#      port: ${REDIS_PORT:6379}
#      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
#      timeout: ${REDIS_TIMEOUT:2s}
#      ssl:
#        enabled: ${REDIS_SSL_ENABLED:false}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: baseline existing schema
    validate-on-migrate: true
    clean-disabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true
            required: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

#logging:
#  level:
#    org.springframework.security: DEBUG
#    org.springframework.security.oauth2: TRACE
#    org.springframework.security.oauth2.client: TRACE
#  pattern:
#    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

cloud:
  aws:
    region: ${AWS_REGION}
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY_ID}
      secret-key: ${AWS_S3_SECRET_ACCESS_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET_NAME}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

app:
  oauth2:
    success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL}

#  redis:
#    key-prefix: ${REDIS_KEY_PREFIX:gymjjak:local}

  scheduler:
    retention:
      cron: "${APP_SCHEDULER_RETENTION_CRON:0 0 3 * * *}"
      zone: "${APP_SCHEDULER_RETENTION_ZONE:Asia/Seoul}"

  retention:
    withdrawn-user:
      enabled: ${APP_RETENTION_WITHDRAWN_USER_ENABLED}

clova:
  ocr:
    invoke-url: "${CLOVA_OCR_INVOKE_URL}"
    secret-key: "${CLOVA_OCR_SECRET_KEY}"

portone:
  store-id: ${PORTONE_STORE_ID}
  api-key: ${PORTONE_API_KEY}
  api-secret: ${PORTONE_API_SECRET}
  channel-key: ${PORTONE_CHANNEL_KEY}
  webhook-secret: ${PORTONE_WEBHOOK_SECRET}

ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    # 로컬·테스트 기본값이며 배포 환경에서는 반드시 별도 비밀값으로 덮어쓴다.
    internal-api-key: ${AI_INTERNAL_API_KEY:local-development-only}
    connect-timeout-millis: ${AI_SERVICE_CONNECT_TIMEOUT_MILLIS:3000}
    response-timeout-seconds: ${AI_SERVICE_RESPONSE_TIMEOUT_SECONDS:90}
server:
  tomcat:
    mbeanregistry:
      enabled: true
  forward-headers-strategy: framework
