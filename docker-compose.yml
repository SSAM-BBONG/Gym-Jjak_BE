version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: gymjjak-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DEV_MYSQL_DATABASE}
      MYSQL_USER: ${DEV_MYSQL_USER}
      MYSQL_PASSWORD: ${DEV_MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DEV_MYSQL_ROOT_PASSWORD}
    ports:
      - "${DEV_MYSQL_PORT}:3306"
    volumes:
      - gymjjak-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gymjjak-backend
    # 자동 재시작 옵션, 도커 컨테이너 실횅시 자동 부팅
    # 개발중에는 no, 배포는 always
    restart: no
    # 도커 실행 전 먼저 실행되는 서비스
    depends_on:
      mysql:
        condition: service_healthy
    # 컨테이너 내부에서 사용할 환경 변수(Environment Variable) 설정
    # 환경 변수 이름을 자동으로 읽어서 application.yml 값으로 매핑
    environment:
      # 활성 프로파일 설정. 실행 시 application-dev.yml을 읽습니다.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # DB 연결 관련 docker 에서는 localhost(x), mysql 로 실행
      DEV_MYSQL_URL: ${DEV_MYSQL_URL}
      DEV_MYSQL_USERNAME: ${DEV_MYSQL_USERNAME}
      DEV_MYSQL_PASSWORD: ${DEV_MYSQL_PASSWORD}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}

      OAUTH2_SUCCESS_REDIRECT_URL: ${OAUTH2_SUCCESS_REDIRECT_URL}

      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}

      APP_SCHEDULER_RETENTION_CRON: ${APP_SCHEDULER_RETENTION_CRON}
      APP_SCHEDULER_RETENTION_ZONE: ${APP_SCHEDULER_RETENTION_ZONE}
      APP_RETENTION_REPORT_GROUP_PERIOD_DAYS: ${APP_RETENTION_REPORT_GROUP_PERIOD_DAYS}
      APP_RETENTION_REPORT_GROUP_BATCH_SIZE: ${APP_RETENTION_REPORT_GROUP_BATCH_SIZE}
      APP_RETENTION_WITHDRAWN_USER_ENABLED: ${APP_RETENTION_WITHDRAWN_USER_ENABLED}
      APP_RETENTION_WITHDRAWN_USER_PERIOD_DAYS: ${APP_RETENTION_WITHDRAWN_USER_PERIOD_DAYS}
      APP_RETENTION_WITHDRAWN_USER_BATCH_SIZE: ${APP_RETENTION_WITHDRAWN_USER_BATCH_SIZE}
      APP_RETENTION_CATEGORY_PERIOD_DAYS: ${APP_RETENTION_CATEGORY_PERIOD_DAYS}
      APP_RETENTION_CATEGORY_BATCH_SIZE: ${APP_RETENTION_CATEGORY_BATCH_SIZE}
      APP_RETENTION_TAG_PERIOD_DAYS: ${APP_RETENTION_TAG_PERIOD_DAYS}
      APP_RETENTION_TAG_BATCH_SIZE: ${APP_RETENTION_TAG_BATCH_SIZE}
      APP_RETENTION_PT_COURSE_PERIOD_DAYS: ${APP_RETENTION_PT_COURSE_PERIOD_DAYS}
      APP_RETENTION_PT_COURSE_BATCH_SIZE: ${APP_RETENTION_PT_COURSE_BATCH_SIZE}
      APP_RETENTION_FEEDBACK_PERIOD_DAYS: ${APP_RETENTION_FEEDBACK_PERIOD_DAYS}
      APP_RETENTION_FEEDBACK_BATCH_SIZE: ${APP_RETENTION_FEEDBACK_BATCH_SIZE}
      APP_RETENTION_TRAINER_REVIEW_PERIOD_DAYS: ${APP_RETENTION_TRAINER_REVIEW_PERIOD_DAYS}
      APP_RETENTION_TRAINER_REVIEW_BATCH_SIZE: ${APP_RETENTION_TRAINER_REVIEW_BATCH_SIZE}
      APP_RETENTION_NOTIFICATION_PERIOD_DAYS: ${APP_RETENTION_NOTIFICATION_PERIOD_DAYS}
      APP_RETENTION_NOTIFICATION_BATCH_SIZE: ${APP_RETENTION_NOTIFICATION_BATCH_SIZE}

      CLOVA_OCR_INVOKE_URL: ${CLOVA_OCR_INVOKE_URL}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY}
    # hostPortNum (my PC) : containerPortNum (docker inner)
    ports:
      - "${DEV_BACKEND_PORT}:8080"
# Docker 영구 저장소 설정
volumes:
  gymjjak-mysql-data:
