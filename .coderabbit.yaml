language: "ko-KR"

tone_instructions: >
  간결하고 단호하지만 예의바르게 존댓말로 리뷰한다.
  운영 장애 가능성, 성능 병목, 데이터 정합성, 보안 리스크를 우선 지적한다.
  단순 스타일 지적보다 아키텍처 위반, 트랜잭션 경계, JPA 쿼리 문제, metric 누락을 우선한다.
  지적 시 반드시 사유와 권장 대안을 함께 제시한다.

reviews:
  profile: "assertive"
  high_level_summary: true
  poem: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "develop"
    ignore_title_keywords:
      - "WIP"
      - "draft"

  path_filters:
    - "!build/**"
    - "!.gradle/**"
    - "!gradle/**"
    - "!**/generated/**"
    - "!**/*.lock"
    - "src/main/**"
    - "src/test/**"
    - "Dockerfile"
    - "docker-compose.yml"
    - "src/main/resources/logback-spring.xml"
    - "src/main/resources/db/schema.sql"
    - ".github/**"
    - "!logs/**"
    - "!.idea/**"
    - "!.vscode/**"
    - "!out/**"
    - "!src/main/resources/db/*dummy*.sql"
    - "!docker/mysql/init/*dummy*.sql"

  path_instructions:
    - path: "src/main/java/**/controller/**"
      instructions: |
        - 인증/인가 누락을 최우선으로 확인한다.
        - request DTO 에 @Valid 누락 여부를 확인한다.
        - pagination, sort, filter 파라미터의 기본값과 최대값 제한을 확인한다.
        - idempotency 가 필요한 생성/결제/상태 변경 API 에 중복 요청 방어가 있는지 확인한다.
        - API 응답 스펙이 CommonResponse 형식을 유지하는지 확인한다.
        - Clean Architecture 관점에서 Controller 가 Entity, Repository, JPA 구현체에 직접 의존하지 않는지 확인한다.
        - Controller 에 비즈니스 로직, 쿼리 조립, metric 계산 로직이 들어가지 않았는지 확인한다.

    - path: "src/main/java/**/application/**"
      instructions: |
        - UseCase/Application Service 가 도메인 흐름을 조율하고 있는지 확인한다.
        - Controller, Infrastructure, JPA Entity 에 직접 강하게 의존하지 않는지 확인한다.
        - 트랜잭션 경계가 UseCase 단위로 적절한지 확인한다.
        - 읽기 전용 UseCase 는 @Transactional(readOnly = true) 적용 여부를 확인한다.
        - metric 수집/계산 로직이 도메인 규칙과 뒤섞이지 않았는지 확인한다.

    - path: "src/main/java/**/service/**"
      instructions: |
        - @Transactional 경계가 적절한지 확인한다.
        - readOnly 누락 여부를 확인한다.
        - 동시성, 중복 처리, 재시도 시 부작용을 집중 리뷰한다.
        - 외부 API 호출 실패, timeout, rollback 처리를 확인한다.
        - BusinessException 사용 시 적절한 ErrorCode 를 사용하는지 확인한다.
        - JPA lazy loading 이 트랜잭션 밖에서 발생할 가능성을 확인한다.
        - metric 기록이 실패했을 때 핵심 비즈니스 로직까지 실패하지 않는지 확인한다.

    - path: "src/main/java/**/domain/**"
      instructions: |
        - Clean Architecture 기준으로 도메인이 Spring, JPA, Web, DB 기술에 과도하게 의존하지 않는지 확인한다.
        - 도메인 캡슐화를 확인한다.
        - public setter, 무분별한 @Setter 사용을 지적한다.
        - 상태 변경 로직이 도메인 내부에 있는지 확인한다.
        - Tell, Don't Ask 원칙을 위반하는 서비스 중심 변경 로직을 지적한다.
        - equals/hashCode 구현이 JPA 프록시, 식별자 생성 전략과 충돌하지 않는지 확인한다.
        - 도메인 이벤트가 필요한 변경인데 단순 필드 수정으로 끝나지 않았는지 확인한다.

    - path: "src/main/java/**/infrastructure/**"
      instructions: |
        - Infrastructure 가 Domain/Application 인터페이스를 구현하는 방향인지 확인한다.
        - Domain 이 Infrastructure 구현체를 직접 참조하지 않는지 확인한다.
        - DB, 외부 API, Metric, Messaging 구현 세부사항이 Application 밖으로 새지 않는지 확인한다.
        - 장애 발생 시 timeout, retry, fallback, circuit breaker 필요성을 검토한다.

    - path: "src/main/java/**/repository/**"
      instructions: |
        - N+1 query 가능성을 최우선으로 확인한다.
        - Fetch Join, EntityGraph, BatchSize, IN 절 활용 여부를 확인한다.
        - findAll() 의 무분별한 사용을 지적한다.
        - pagination 과 정렬 기준이 안정적인지 확인한다.
        - offset pagination 이 대용량 데이터에서 병목이 될 가능성을 지적한다.
        - keyset pagination 적용 가능성을 검토한다.
        - @Query JPQL 사용 시 파라미터 바인딩을 확인한다.
        - native query 사용 시 SQL injection, DB 종속성, index 사용 가능성을 확인한다.
        - count query 비용이 큰 pageable query 를 지적한다.

    - path: "src/main/java/**/query/**"
      instructions: |
        - 조회 전용 Query 모델이 Command/Domain 변경 로직과 섞이지 않았는지 확인한다.
        - 복잡한 조회는 fetch join, projection, DTO query, QueryDSL 사용이 적절한지 확인한다.
        - 불필요한 Entity 로딩 대신 projection 을 사용할 수 있는지 검토한다.
        - where 조건이 index 를 탈 수 있는지 확인한다.
        - like '%keyword%' 등 index 를 무력화하는 조건을 지적한다.
        - group by, join, subquery 의 실행 비용과 대용량 데이터 영향을 확인한다.
        - query 결과의 정렬 기준이 유일하고 재현 가능한지 확인한다.

    - path: "src/main/java/**/jpa/**"
      instructions: |
        - Entity 와 Domain 모델이 분리되어야 하는 구조라면 의존 방향 위반을 확인한다.
        - 양방향 연관관계 편의 메서드 누락을 확인한다.
        - cascade, orphanRemoval 사용이 데이터 삭제 위험을 만들지 않는지 확인한다.
        - fetch = EAGER 사용을 지적한다.
        - @ManyToOne, @OneToMany 관계에서 N+1 가능성을 확인한다.
        - 컬렉션 fetch join + pagination 조합을 지적한다.
        - dirty checking 에 의존한 변경이 명확한 도메인 메서드를 통해 수행되는지 확인한다.

    - path: "src/main/java/**/metric/**"
      instructions: |
        - metric 이름, tag cardinality, 단위가 일관적인지 확인한다.
        - userId, email, token, requestId 등 고카디널리티/민감정보 tag 사용을 지적한다.
        - Counter, Gauge, Timer, DistributionSummary 선택이 적절한지 확인한다.
        - 실패/성공/latency metric 이 함께 수집되는지 확인한다.
        - 외부 API, DB query, batch, scheduler 작업의 latency 와 failure metric 누락을 확인한다.
        - metric 수집 실패가 핵심 로직 장애로 전파되지 않도록 방어되어 있는지 확인한다.
        - alert 로 이어질 수 없는 장식성 metric 추가를 지적한다.

    - path: "src/main/java/**/dto/**"
      instructions: |
        - request/response DTO 는 record 사용을 우선 권장한다.
        - 불필요한 가변 필드를 지적한다.
        - @NotNull, @NotBlank, @Email, @Pattern, @Size 등 validation 누락을 확인한다.
        - 응답 DTO 에 password, token, 내부 ID, PII 등 민감 정보가 노출되지 않는지 확인한다.
        - Entity 를 API 응답으로 직접 반환하지 않는지 확인한다.

    - path: "src/main/java/com/team23/common/security/**"
      instructions: |
        - 토큰 검증, 권한 체크, refresh flow, 민감정보 노출을 집중 리뷰한다.
        - 로그에 credential, token, PII 가 남지 않는지 확인한다.
        - SecurityConfig 의 requestMatchers 순서와 permitAll/hasRole 사용을 확인한다.
        - JWT claim 추출 시 타입 변환 안전성, null 처리를 확인한다.

    - path: "src/main/java/com/team23/common/**"
      instructions: |
        - 공통 인프라 변경은 모든 도메인에 영향을 미치므로 영향 범위를 확인한다.
        - ErrorCode 추가 시 HTTP status, code prefix, message 일관성을 확인한다.
        - GlobalExceptionHandler 변경 시 기존 예외 처리 흐름과 호환되는지 확인한다.
        - 공통 응답, 예외, metric, logging 변경이 기존 클라이언트를 깨지 않는지 확인한다.

    - path: "src/test/java/**"
      instructions: |
        - happy path 외 실패 케이스, 경계값, 권한 실패, 동시성 케이스가 있는지 확인한다.
        - JPA query 테스트에서 N+1 여부를 검증하는지 확인한다.
        - repository/query 테스트에서 pagination, sort 안정성을 검증하는지 확인한다.
        - metric 이 필요한 흐름에서 성공/실패 metric 기록 여부를 검증하는지 확인한다.
        - @BeforeEach 에서 테스트 격리가 보장되는지 확인한다.
        - mock 이 실제 장애 상황을 충분히 반영하는지 확인한다.

    - path: "**/application*.{yaml,yml,properties}"
      instructions: |
        - credentials, API key, secret 이 평문으로 노출되지 않는지 확인한다.
        - 환경 변수 참조 (${VAR}) 누락이나 default 값의 보안 영향을 확인한다.
        - profile 별 설정 분리가 적절한지 확인한다.
        - datasource, hikari, jpa, logging, actuator, metrics 설정이 운영 환경에 안전한지 확인한다.
        - show-sql, format_sql 이 운영 profile 에서 켜져 있지 않은지 확인한다.

    - path: "**/build.gradle*"
      instructions: |
        - 의존성 추가 시 보안 취약점, 라이센스, 버전 충돌 가능성을 확인한다.
        - JPA, QueryDSL, Micrometer, Actuator 관련 의존성 버전 호환성을 확인한다.
        - 불필요하게 무거운 라이브러리 추가를 지적한다.

    - path: "**/.env*"
      instructions: |
        - .env 파일이 .gitignore 에 포함되어 있는지 반드시 확인한다.
        - 실제 credentials 가 커밋된 경우 즉시 지적한다.

    - path: "src/main/java/com/ssambbong/gymjjak/**/{presentation,presectation}/api/**"
      instructions: |
        - 기존 controller 리뷰 기준을 그대로 적용한다.
        - 이 프로젝트의 Controller 계층은 presentation/api 또는 오타가 포함된 presectation/api 경로에 존재하므로 해당 경로도 함께 리뷰한다.
        - 인증/인가 누락, @PreAuthorize 누락, SecurityConfig와 실제 API 권한 정책 불일치를 최우선으로 확인한다.
        - 응답이 GlobalApiResponse와 도메인별 ResponseCode 형식을 일관되게 사용하는지 확인한다.
        - MultipartFile 업로드 API는 파일 크기, 확장자, content-type, 빈 파일, S3 실패 처리까지 확인한다.

    - path: "src/main/java/com/ssambbong/gymjjak/**/adapter/in/web/**"
      instructions: |
        - 기존 controller/dto 리뷰 기준을 그대로 적용한다.
        - Web Adapter는 요청 변환과 UseCase 호출에 집중해야 하며 비즈니스 로직을 포함하지 않아야 한다.
        - AuthUser, @AuthenticationPrincipal, JWT 기반 사용자 식별이 null-safe 한지 확인한다.
        - 외부 입력을 Command 객체로 변환할 때 필수 값 검증과 권한 검증 흐름이 빠지지 않았는지 확인한다.

    - path: "src/main/java/com/ssambbong/gymjjak/**/application/{service,usecase,command,query,port}/**"
      instructions: |
        - 기존 application/service/query 리뷰 기준을 그대로 적용한다.
        - Application Service/UseCase가 도메인 흐름을 조율하고 트랜잭션 경계를 명확히 갖는지 확인한다.
        - 조회 전용 로직은 @Transactional(readOnly = true)를 우선 권장한다.
        - Controller, MultipartFile, JPA Entity, SpringData Repository 등 Web/Infrastructure 세부 구현 의존이 Application에 새지 않는지 확인한다.
        - 외부 시스템(S3 등) 호출과 DB 트랜잭션이 함께 있을 때 실패 보상/롤백 전략이 있는지 확인한다.

    - path: "src/main/java/com/ssambbong/gymjjak/**/infrastructure/persistence/**"
      instructions: |
        - 기존 repository/jpa/infrastructure 리뷰 기준을 그대로 적용한다.
        - Domain 모델과 JpaEntity 매핑 누락, ID/상태/deletedAt 변환 누락을 확인한다.
        - N+1 query, FetchType.EAGER, 컬렉션 fetch join + pagination 조합을 최우선으로 확인한다.
        - @Query/nativeQuery 사용 시 파라미터 바인딩, SQL injection, index 활용 가능성, count query 비용을 확인한다.
        - soft delete(deletedAt)와 status 조건이 조회/수정/삭제 쿼리에 일관되게 반영되는지 확인한다.

    - path: "src/main/java/com/ssambbong/gymjjak/global/security/**"
      instructions: |
        - 기존 security 리뷰 기준을 그대로 적용한다.
        - SecurityConfig의 requestMatchers 순서, permitAll 범위, hasAuthority/hasAnyAuthority 정책을 집중 리뷰한다.
        - /actuator/** 전체 permitAll, Swagger 공개 범위, 토큰 재발급/검증 API 권한 정책을 반드시 확인한다.
        - JWT secret 길이, claim 타입 변환, 만료 처리, refresh token 검증/저장/폐기 흐름을 확인한다.
        - 로그에 token, password, credential, PII가 남지 않는지 확인한다.

    - path: "src/main/java/com/ssambbong/gymjjak/file/**"
      instructions: |
        - 기존 infrastructure/service/domain 리뷰 기준을 그대로 적용한다.
        - S3 업로드/삭제/교체 흐름에서 DB 저장 실패 시 보상 처리와 반대 케이스의 정합성을 확인한다.
        - 파일 타입 정책, 업로더 권한, presigned URL 만료, S3 key 노출 위험을 확인한다.
        - 파일 업로드 실패가 핵심 트랜잭션에 어떤 영향을 주는지 명확히 리뷰한다.

    - path: "src/main/java/com/ssambbong/gymjjak/global/presentation/api/common/**"
      instructions: |
        - 기존 common 리뷰 기준을 그대로 적용한다.
        - GlobalApiResponse, GlobalApiErrorResponse, GlobalExceptionHandler 변경이 기존 클라이언트 응답 스펙을 깨지 않는지 확인한다.
        - ErrorCode/ResponseCode의 HTTP status, code prefix, message 일관성을 확인한다.
        - 예외 로그에 traceId는 포함하되 민감정보가 포함되지 않는지 확인한다.

    - path: "src/main/resources/logback-spring.xml"
      instructions: |
        - prod profile의 로그 레벨, SQL 로그, 파일 보관 정책, 민감정보 마스킹 여부를 확인한다.
        - MDC traceId가 요청 추적에 충분하고 userId/token/password 등 민감정보가 패턴에 포함되지 않는지 확인한다.
        - Swagger 문서, 로그, PR 템플릿, 사용자/API 노출 문구에 한글 인코딩 깨짐이 있는 경우 우선 지적한다.

    - path: "**/schema.sql"
      instructions: |
        - FK, unique constraint, not null, index, soft delete 컬럼이 도메인 규칙과 일치하는지 확인한다.
        - 대용량 조회가 예상되는 조건에 필요한 index가 누락되지 않았는지 확인한다.
        - refresh token, user credential, 파일 메타데이터 등 보안 민감 테이블 제약을 집중 리뷰한다.

    - path: "Dockerfile"
      instructions: |
        - 멀티스테이지 빌드, JDK/JRE 이미지, root 실행 여부, 캐시 효율, 테스트 제외(-x test)의 위험을 확인한다.
        - 런타임 이미지에 불필요한 파일이나 secret이 포함되지 않는지 확인한다.

    - path: "docker-compose.yml"
      instructions: |
        - secret은 .env 참조만 사용하고 평문 값이 들어가지 않았는지 확인한다.
        - DB healthcheck, 포트 노출, volume, restart 정책이 개발/운영 목적에 맞는지 확인한다.
        - AWS/JWT/DB 환경 변수가 누락되거나 잘못 매핑되지 않았는지 확인한다.

    - path: ".github/**"
      instructions: |
