name: "📝 Docs Template"
description: "문서 작업 완료 후 내용을 정리하여 보고하는 이슈입니다."
title: "[DOCS] "
labels: ["docs"]
assignees: []
body:
  - type: textarea
    id: docs-description
    attributes:
      label: "📝 문서 작업 내용"
      description: "어떤 문서를 작업했는지 명확하고 간결하게 작성해주세요."
      placeholder: "예) API 명세서에 누락된 village 조회 엔드포인트를 추가했습니다."
    validations:
      required: true
  - type: textarea
    id: docs-reason
    attributes:
      label: "💡 작업 이유"
      description: "해당 문서 작업이 필요했던 이유를 작성해주세요."
      placeholder: "예) 신규 API 추가로 인해 README의 엔드포인트 목록이 최신화되지 않았습니다."
    validations:
      required: true
  - type: textarea
    id: docs-changes
    attributes:
      label: "🔧 변경 사항"
      description: "구체적으로 무엇을 추가/수정/삭제했는지 작성해주세요."
      value: |
        - 추가: 
        - 수정: 
        - 삭제:
    validations:
      required: true
  - type: dropdown
    id: docs-type
    attributes:
      label: "📂 문서 유형"
      description: "작업한 문서의 유형을 선택해주세요."
      options:
        - "README"
        - "API 명세서"
        - "ERD"
        - "아키텍처 문서"
        - "기타"
    validations:
      required: true