name: "🐛 Bug Fix Report Template"
description: "버그 수정 완료 후 내용을 정리하여 보고하는 이슈입니다."
title: "[FIX] "
labels: ["fix"]
assignees: []
body:
  - type: textarea
    id: bug-description
    attributes:
      label: "🐛 버그 내용"
      description: "수정한 버그가 무엇이었는지 명확하고 간결하게 작성해주세요."
      placeholder: "예) 특정 city에 속한 village 목록을 조회하는 API 호출 시 500 Internal Server Error가 발생했습니다."
    validations:
      required: true
  - type: textarea
    id: root-cause
    attributes:
      label: "🔍 원인 분석"
      description: "버그의 근본 원인을 작성해주세요."
      placeholder: "예) JPA N+1 문제로 인해 쿼리가 과도하게 발생하여 타임아웃이 발생했습니다."
    validations:
      required: true
  - type: textarea
    id: fix-description
    attributes:
      label: "🔧 수정 내용"
      description: "어떻게 수정했는지 구체적으로 작성해주세요."
      placeholder: "예) Fetch Join을 사용하여 N+1 문제를 해결했습니다."
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: "✅ 수정 결과"
      description: "수정 후 정상 동작을 확인한 내용을 작성해주세요."
      placeholder: "예) HTTP 상태 코드 200과 함께 정상적인 JSON 응답이 반환되는 것을 확인했습니다."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "📎 참고 로그 / 스택 트레이스"
      description: "수정 전 에러 로그나 예외 스택 트레이스가 있다면 첨부해주세요."
      render: java
    validations:
      required: false
  - type: dropdown
    id: environment
    attributes:
      label: "🖥 실행 환경"
      description: "버그가 발생한 환경을 선택해주세요."
      options:
        - "Local (로컬 개발 환경)"
        - "Dev (개발/테스트 서버)"
        - "Prod (운영 서버)"
    validations:
      required: true