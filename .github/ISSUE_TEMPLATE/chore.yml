name: "⚙️ Chore Template"
description: "빌드, 설정 등 잡무 작업 완료 후 내용을 정리하여 보고하는 이슈입니다."
title: "[CHORE] "
labels: ["chore"]
assignees: []
body:
  - type: textarea
    id: chore-description
    attributes:
      label: "⚙️ 작업 내용"
      description: "어떤 작업을 했는지 명확하고 간결하게 작성해주세요."
      placeholder: "예) 불필요한 빌드 산출물이 추적되지 않도록 .gitignore를 수정했습니다."
    validations:
      required: true
  - type: textarea
    id: chore-reason
    attributes:
      label: "💡 작업 이유"
      description: "해당 작업이 필요했던 이유를 작성해주세요."
      placeholder: "예) 로컬 빌드 파일이 원격 저장소에 불필요하게 포함되고 있었습니다."
    validations:
      required: true
  - type: textarea
    id: chore-changes
    attributes:
      label: "🔧 변경 사항"
      description: "구체적으로 무엇을 추가/수정/삭제했는지 작성해주세요."
      value: |
        - 추가: 
        - 수정: 
        - 삭제:
    validations:
      required: true
  - type: dropdown
    id: chore-type
    attributes:
      label: "📂 작업 유형"
      description: "작업의 유형을 선택해주세요."
      options:
        - "빌드 설정 (Gradle, Maven 등)"
        - "CI/CD 파이프라인"
        - "패키지 / 의존성 관리"
        - "코드 포맷 / 린트 설정"
        - "환경 변수 / 설정 파일"
        - "기타"
    validations:
      required: true