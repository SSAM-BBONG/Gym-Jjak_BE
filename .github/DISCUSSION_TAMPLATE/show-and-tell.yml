title: "[Show and Tell] "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        만든 것, 시도한 것, 실험한 것, 공유하고 싶은 결과물을 올리는 공간입니다.
        가볍게 보여주되 맥락이 드러나게 작성해주세요.

  - type: input
    id: summary
    attributes:
      label: 공유 주제
      description: 무엇을 보여주고 싶은지 한 줄로 적어주세요.
      placeholder: 예) 사용자 프로필 페이지 UI 시안 공유
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: 소개
      description: 어떤 작업인지 간단히 설명해주세요.
      placeholder: 예) 프로필 편집 화면의 첫 번째 시안을 만들어봤습니다.
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: 핵심 포인트
      description: 특히 봐줬으면 하는 부분이나 강조하고 싶은 점을 적어주세요.
      placeholder: |
        예)
        - 레이아웃 구조
        - 버튼 배치
        - 모바일 대응 방식
    validations:
      required: false

  - type: textarea
    id: feedback_wanted
    attributes:
      label: 받고 싶은 피드백
      description: 어떤 의견을 듣고 싶은지 적어주세요.
      placeholder: 예) 정보 배치가 자연스러운지, CTA 버튼 위치가 적절한지 의견 부탁드립니다.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 이미지, 링크, PR, 브랜치, 데모 주소 등이 있다면 적어주세요.
      placeholder: 예) Figma 링크, PR #24, dev/profile-ui 브랜치
    validations:
      required: false
