name: Docker Build & Push
# 이 워크플로우의 이름

on:
  push:
    branches:
      - main
# main 브랜치에 push(머지 포함)될 때 자동 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # GitHub Actions 가상 서버(ubuntu)에서 실행

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
        # GitHub 레포의 코드를 가상 서버에 내려받기 (git clone 같은 것)

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        # GitHub Secrets에 저장한 Docker Hub 아이디/비밀번호로 로그인

      - name: 이미지 빌드 & 푸시
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymjjak-backend:latest
        # Dockerfile 기반으로 이미지 빌드 후
        # Docker Hub에 {아이디}/gymjjak-backend:latest 태그로 push