global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 자기 자신 메트릭 수집
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"
          env: "docker"

  # GymJjak Spring Boot Actuator 메트릭 수집
  - job_name: "gymjjak"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["backend:8080"]
        labels:
          app: "gymjjak-backend"
          env: "docker"