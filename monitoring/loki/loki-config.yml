# Loki 설정 파일
# 역할: Promtail이 전송한 로그를 저장하고, Grafana가 조회할 수 있게 제공한다.
# 실행 기준:
# - Loki는 Windows exe로 직접 실행
# - Promtail도 Windows exe로 직접 실행
# - Grafana datasource는 http://localhost:3100 사용
#
# 실행 예:
# C:\env\loki-windows-amd64.exe --config.file=./monitoring/loki/loki-config.yml

auth_enabled: false

server:
  # Loki HTTP API 포트
  # Promtail push, Grafana query에서 사용
  http_listen_port: 3100

  # Loki 내부 gRPC 포트
  grpc_listen_port: 9095

common:
  # 단일 로컬 인스턴스이므로 localhost 사용
  instance_addr: 127.0.0.1

  # Loki 데이터 저장 기준 경로
  # 상대경로를 사용하므로 팀원별 프로젝트 위치가 달라도 동작
  path_prefix: ./monitoring/loki/data

  storage:
    filesystem:
      # 로그 chunk 저장 경로
      chunks_directory: ./monitoring/loki/data/chunks

      # ruler 기능을 사용할 경우 rule 저장 경로
      rules_directory: ./monitoring/loki/data/rules

  # 로컬 단일 인스턴스이므로 복제 계수 1
  replication_factor: 1

  ring:
    kvstore:
      # 로컬 단일 인스턴스에서는 in-memory ring 사용
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    # 활성 index 저장 경로
    active_index_directory: ./monitoring/loki/data/index

    # index cache 저장 경로
    cache_location: ./monitoring/loki/data/index-cache

limits_config:
  # 너무 오래된 로그가 들어오는 것을 방지
  reject_old_samples: true
  reject_old_samples_max_age: 168h

  # 로컬 로그 보관 기간: 7일
  retention_period: 168h

compactor:
  # retention 정리 작업 경로
  working_directory: ./monitoring/loki/data/compactor

  # retention 활성화
  retention_enabled: true

  # 삭제 요청 메타데이터 저장 방식
  delete_request_store: filesystem