# Grafana provisioning 설정 버전
apiVersion: 1

# Grafana에 자동 등록할 datasource 목록입니다.
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    # Grafana에서 기본 datasource로 Prometheus를 사용합니다.
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
