# Promtail 설정 파일
# 역할: 로그를 수집하여 Loki로 전송하는 에이전트
# - Windows 로컬 로그 파일 수집
# - 수집한 로그를 Loki HTTP API를 통해 전송
# - 재시작 시 중복 로그 방지를 위해 읽은 위치 기록

server:
  http_listen_port: 9080

  # gRPC 포트 설정
  # 0으로 설정하면 gRPC 서버 비활성화 (단순 로그 수집 용도에서는 불필요)
  grpc_listen_port: 0

# 읽은 로그의 오프셋(위치) 저장 설정 섹션
# Promtail은 읽은 파일의 마지막 위치를 저장하여 재시작 시 중복 수집 방지
positions:
  # 읽은 로그 위치 정보를 저장할 파일 경로
  # 이 파일은 Promtail 재시작 시 이미 읽은 로그 위치를 기억하기 위해 필요하다.
  # 형식: YAML 파일로 각 로그 파일의 읽은 위치(바이트 offset)를 기록
  # 컨테이너 내부 임시 경로에 offset 정보를 저장합니다.
  filename: /tmp/promtail-positions.yml

# Loki 서버 연결 설정 섹션
# 수집한 로그를 어디로 전송할지 정의
clients:
  # 첫 번째 Loki 서버 연결 설정
  # Docker Compose 내부에서는 loki 서비스명으로 접근합니다.
  - url: http://${MONITORING_EC2_PRIVATE_IP}:3100/loki/api/v1/push
    # 설명:
    # - 127.0.0.1: Windows에서 loki-windows-amd64.exe를 직접 실행하는 로컬 루프백 주소
    # - 일부 Windows/DNS 환경에서는 Promtail이 localhost를 외부 DNS로 조회해 실패할 수 있으므로 IP를 직접 사용한다.
    # - 3100: loki-config.yaml의 server.http_listen_port 값과 동일
    # - /loki/api/v1/push: Loki가 로그를 수신하는 엔드포인트
    # 형식: HTTP POST로 로그 데이터(protobuf 형식)를 전송

    # 배치 전송 설정 (옵션)
    # batch_size: 1024 # 몇 개의 로그 라인을 모아서 한 번에 전송할지 설정
    # batch_timeout: 1s # 배치 전송 대기 시간. 초과하면 즉시 전송

    # 재시도 설정 (옵션)
    # backoff_config:
    #   min_period: 500ms # 첫 재시도 대기 시간
    #   max_period: 5m # 최대 대기 시간
    #   max_retries: 10 # 최대 재시도 횟수

# 로그 수집 설정 섹션
# scrape_configs는 Promtail이 "어디서", "어떤 로그를" "어떤 이름으로" 수집할 것인가 설정하는 것이다.
scrape_configs:
  # 첫 번째 잡(job) 설정
  # job : 수집 작업의 그룹 이름(예: spring-logs, api-logs 등)
  # Targets : 수집할 대상 서버(보통 Promtail 자신인 localhost를 사용하게 된다.)
  # Labels : Loki에 저장될 때 검색의 기준이 되는 "인덱스" 라벨 설정 (예 : job="spring-logs")
  # __path__ : 실제 로그 파일이 있는 Windows 로컬 경로 설정
  # Docker 컨테이너 로그 수집 job입니다.
  - job_name: docker

    # Docker socket을 통해 실행 중인 컨테이너를 자동 발견합니다.
    docker_sd_configs:
      # docker-compose.monitoring.yml에서 mount한 Docker socket입니다.
      - host: unix:///var/run/docker.sock
        # 5초마다 컨테이너 목록을 갱신합니다.
        refresh_interval: 5s

    # relabels_configs는 "라벨을 재가공하는 경우" 추가한다.
    # 이는 기존 라벨을 변경하거나 새로운 라벨을 추가하는 데 사용되며
    # 로그 본문을 읽기 전에 적용되며 Loki에 전송되는 라벨에 영향을 미친다.
    relabel_configs:
      # Docker Compose service 이름을 읽는다.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        # Loki에서 service 라벨로 저장합니다.
        target_label: "service"

      # Docker container 이름을 읽습니다.
      - source_labels: ["__meta_docker_container_name"]
        # Docker container 이름 앞의 / 문자를 제거합니다.
        regex: "/(.*)"
        # Loki에서 container 라벨로 저장합니다.
        target_label: "container"

      # stdout/stderr stream 정보를 읽습니다.
      - source_labels: ["__meta_docker_container_log_stream"]
        # Loki에서 stream 라벨로 저장합니다.
        target_label: "stream"

      # 현재 수집 환경을 dev로 표시합니다.
      - target_label: "env"
        # Loki에서 env="deploy" 라벨로 검색할 수 있게 합니다.
        replacement: "deploy"

      # Docker container id를 읽습니다.
      - source_labels: ["__meta_docker_container_id"]
        # Promtail이 실제로 읽을 Docker JSON log 파일 경로로 변환합니다.
        target_label: "__path__"
        # Docker 기본 JSON log 파일 위치입니다.
        replacement: "/var/lib/docker/containers/$1/$1-json.log"

    # Docker JSON log를 Spring Boot 로그 라인으로 파싱합니다.
    pipeline_stages:
      # Docker JSON log의 log, stream, timestamp 필드를 처리합니다.
      - docker: {}
      # 로그의 본문을 정규표현식으로 분석하기 위한 설정.
      - regex:
          # INFO/WARN/ERROR/DEBUG/TRACE 중 하나를 level로 캡처합니다.
          expression: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \[[^\]]+\]\s+(?P<level>INFO|WARN|ERROR|DEBUG|TRACE)\s+'
        # labels: 위에서 추출한 값을 Loki 라벨로 추가
      - labels:
          # 추출한 level 값을 Loki 라벨로 추가
          level:
      # 라벨 예시 : {job="popular-shop", app="module01-actuator", env="local", level="INFO"}

